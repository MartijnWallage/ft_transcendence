services:

  django:
    container_name: django
    build:
      context: containers/django
      dockerfile: Dockerfile
    env_file: 
    - .env
    networks:
      - ts-network
    expose:
      - "8443" #exposed for daphne
    # ports:
    #   - "8000:8000"
    depends_on:
      - "postgressql"
      #- media:/media/
    restart: always 

  postgressql:
    container_name : postgressql
    build:
      context: containers/postgressql
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
     - ts-network
    expose:
      - "5432"
    restart: on-failure #always
    volumes:
      - database:/var/lib/postgresql/data/

  nginx:
    container_name: nginx
    build:
     context: containers/nginx
     dockerfile: Dockerfile
    env_file: 
      - .env 
    networks:
       - ts-network
    ports:
      - "8443:443"   # For HTTPS
      #- "8080:80"   # For HTTP redirection
    restart: on-failure #always
    depends_on:
      - django
    # volumes:
    #   - static:/static/
      #- media:/media/
  
  # daphne:
  #   build: .
  #   container_name: daphne
  #   expose:
  #     - "8443"
  #   networks:
  #     - ts-network

networks:
  ts-network:
    driver: bridge

volumes:
  database:


